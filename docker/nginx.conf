# Optional reverse proxy placing the frontend and API behind a single origin.
# Routes /api/* to the RepoLens API server and everything else to the frontend.
# Workspace directories are never served statically — files are only exposed
# through controlled API export endpoints.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  keepalive_timeout 65;

  upstream repolens_frontend {
    server frontend:5173;
  }

  upstream repolens_api {
    server server:4000;
  }

  server {
    listen 8080;
    server_name _;

    # API + Server-Sent Events (disable buffering so progress streams live).
    location /api/ {
      proxy_pass http://repolens_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
    }

    location / {
      proxy_pass http://repolens_frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
